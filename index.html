<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Danh ngôn</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:transparent;
}

.widget{

    width:100%;
    max-width:1000px;
    margin:auto;

    border-radius:18px;
    overflow:hidden;

    background:
    linear-gradient(135deg,#0061ff,#60efff);

    color:white;

    box-shadow:
    0 10px 25px rgba(0,0,0,0.2);

}

.header{

    padding:15px 20px;

    display:flex;
    align-items:center;
    gap:15px;

    background:rgba(255,255,255,0.12);

}

.logo{

    width:60px;
    height:60px;

    border-radius:50%;
    background:white;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:4px;

}

.logo img{

    width:100%;
    height:100%;
    object-fit:contain;

}

.school h2{
    font-size:22px;
}

.school p{
    font-size:13px;
    opacity:0.9;
}

.content{

    padding:40px 25px;
    text-align:center;
    position:relative;

}

.icon{

    font-size:60px;
    opacity:0.15;

    position:absolute;
    top:10px;
    left:20px;

}

.quote{

    font-size:28px;
    line-height:1.6;
    font-weight:bold;

    min-height:120px;

    transition:0.4s;

}

.author{

    margin-top:18px;
    font-size:16px;
    opacity:0.9;
    font-weight:bold;

}

.footer{

    text-align:center;
    padding:10px;

    background:rgba(0,0,0,0.15);

    font-size:14px;

}

@media(max-width:768px){

    .quote{
        font-size:20px;
    }

    .school h2{
        font-size:18px;
    }

}

</style>
</head>

<body>

<div class="widget">

    <div class="header">

       <div class="logo">
    <img src="LOGOTHCS.png" alt="Logo trường THCS TÂN HƯNG TÂY">
</div>

        <div class="school">
            <h2>TRƯỜNG THCS TÂN HƯNG TÂY</h2>
            <p>Danh ngôn học đường</p>
        </div>

    </div>

    <div class="content">
        <div class="quote" id="quote">
            Đang tải dữ liệu...
        </div>
        <div class="author" id="author"></div>
    </div>
    <div class="footer">
        🌟 Mỗi ngày một câu hay - Mỗi ngày một điều tốt 🌟
    </div>

</div>

<script>

// URL APPS SCRIPT
const apiURL =
"https://script.google.com/macros/s/AKfycbzNoydSBpbWkhmw_XJrV2CPbrVVaQHkMdOmQeXi1_bSA3DRATzYQnmHNc-g_tvi09sAPg/exec";

let quotes = [];
let index = 0;

async function loadData(){

    try{

        const response =
        await fetch(apiURL);

        quotes =
        await response.json();

        showQuote();

        setInterval(showQuote,30000);

    }catch(error){

        document.getElementById("quote")
        .innerHTML =
        "Không tải được dữ liệu";

        console.log(error);

    }

}

function showQuote(){

    if(quotes.length === 0) return;

    const quote =
    document.getElementById("quote");

    const author =
    document.getElementById("author");

    quote.style.opacity = 0;

    setTimeout(()=>{

        quote.innerHTML =
        quotes[index].text;

        author.innerHTML =
        "— " + quotes[index].author;

        quote.style.opacity = 1;

        index++;

        if(index >= quotes.length){
            index = 0;
        }

    },300);

}

loadData();

</script>

</body>
</html>
