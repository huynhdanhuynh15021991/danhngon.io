<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1060">

<title>Danh Ngôn THCS TÂN HƯNG TÂY</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.banner{

    width:1060px;
    height:150px;

    background:
    linear-gradient(135deg,#005bea,#00c6fb);

    overflow:hidden;

    display:flex;
    align-items:center;

    padding:15px 25px;

    color:white;

    position:relative;

    box-shadow:
    0 5px 20px rgba(0,0,0,0.2);

}

/* Logo */

.logo{

    width:95px;
    height:95px;

    border-radius:50%;

    background:white;

    padding:5px;

    overflow:hidden;

    flex-shrink:0;

    display:flex;
    justify-content:center;
    align-items:center;

}

.logo img{

    width:100%;
    height:100%;
    object-fit:contain;

}

/* Nội dung */

.content{

    margin-left:22px;

    flex:1;

    overflow:hidden;

}

.school{

    font-size:14px;
    font-weight:bold;
    font-family:Times New Roman;
    margin-bottom:2px;

    letter-spacing:1px;

}

.quote{

    font-size:24px;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    width:100%;

    animation:fade 1s;

    padding:0 20px;

}

.author{

    margin-top:8px;
    font-size:14px;
    opacity:0.9;
    text-align:center;
    align-items:center;

}

/* icon */

.icon{

    position:absolute;

    right:20px;
    top:10px;

    font-size:90px;

    opacity:0.12;

}

.footer{

    position:absolute;

    bottom:8px;
    right:20px;

    font-size:12px;

    opacity:0.8;

}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(8px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>
</head>

<body>

<div class="banner">

    <!-- Logo -->
    <div class="logo">
        <img src="LOGOTHCS.png" alt="Logo Trường THCS Tân Hưng Tây">
    </div>

    <!-- Nội dung -->
    <div class="content">

        <div class="school">
            DANH NGÔN - NGẠN NGỮ
        </div>

        <div class="quote" id="quote">
            Đang tải dữ liệu...
        </div>

        <div class="author" id="author"></div>

    </div>

    <div class="icon">❝</div>

    <div class="footer">
     Mỗi ngày học một câu hay - Mỗi ngày làm một điều tốt
    </div>

</div>

<script>

//===========================
// URL APPS SCRIPT
//===========================

const apiURL =
"https://script.google.com/macros/s/AKfycbzNoydSBpbWkhmw_XJrV2CPbrVVaQHkMdOmQeXi1_bSA3DRATzYQnmHNc-g_tvi09sAPg/exec";

//===========================

let quotes = [];
let index = 0;

async function loadData(){

    try{

        const response =
        await fetch(apiURL);

        quotes =
        await response.json();

        showQuote();

        setInterval(showQuote,30000);

    }catch(error){

        document.getElementById("quote")
        .innerHTML =
        "Không tải được dữ liệu";

    }

}

let lastIndex = -1;

function showQuote(){

    if(quotes.length === 0) return;

    const quote =
    document.getElementById("quote");

    const author =
    document.getElementById("author");

    let randomIndex;

    do{

        randomIndex =
        Math.floor(Math.random() * quotes.length);

    }while(randomIndex === lastIndex);

    lastIndex = randomIndex;

    quote.style.opacity = 0;

    setTimeout(()=>{

        quote.innerHTML =
        quotes[randomIndex].text;

        author.innerHTML =
        "— " + quotes[randomIndex].author + " —";

        quote.style.opacity = 1;

    },300);

}

loadData();

</script>

</body>
</html>
