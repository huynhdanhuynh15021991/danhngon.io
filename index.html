<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Danh ngôn học đường</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:transparent;
    overflow:hidden;
}

.quote-widget{
    width:100%;
    max-width:1000px;
    margin:auto;
    border-radius:18px;
    overflow:hidden;
    background:linear-gradient(135deg,#0061ff,#60efff);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    color:white;
}

.header{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px 20px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(5px);
}

.header img{
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;
    padding:5px;
}

.school-info h2{
    font-size:22px;
}

.school-info p{
    font-size:13px;
    opacity:0.9;
}

.quote-content{
    padding:40px 25px;
    text-align:center;
    position:relative;
}

.quote-icon{
    font-size:60px;
    opacity:0.15;
    position:absolute;
    top:10px;
    left:20px;
}

.quote-text{
    font-size:28px;
    line-height:1.6;
    font-weight:bold;
    min-height:120px;
    transition:0.5s;
}

.quote-author{
    margin-top:18px;
    font-size:16px;
    opacity:0.9;
}

.footer{
    padding:10px;
    text-align:center;
    background:rgba(0,0,0,0.15);
    font-size:14px;
}

@media(max-width:768px){

    .quote-text{
        font-size:20px;
        min-height:140px;
    }

    .school-info h2{
        font-size:18px;
    }

    .header img{
        width:45px;
        height:45px;
    }

}

</style>
</head>

<body>

<div class="quote-widget">

    <div class="header">

        <img src="https://cdn-icons-png.flaticon.com/512/2436/2436874.png">

        <div class="school-info">
            <h2>TRƯỜNG THCS</h2>
            <p>Danh ngôn - Tục ngữ học đường</p>
        </div>

    </div>

    <div class="quote-content">

        <div class="quote-icon">❝</div>

        <div class="quote-text" id="quote">
            Đang tải dữ liệu...
        </div>

        <div class="quote-author" id="author"></div>

    </div>

    <div class="footer">
        🌟 Mỗi ngày một câu hay - Mỗi ngày một điều tốt 🌟
    </div>

</div>

<script>

//==============================
// LINK GOOGLE SHEET JSON
//==============================

// THAY ID SHEET CỦA BẠN
const sheetID = "1djNn7xGPNbWtsFqMEqApOpqFmmnzBXIn";

// Tên sheet
const sheetName = "Sheet1";

// URL JSON
const url = `https://opensheet.elk.sh/${sheetID}/${sheetName}`;

let quotes = [];
let index = 0;

//==============================
// LOAD DATA
//==============================

async function loadQuotes(){

    try{

        const response = await fetch(url);
        const data = await response.json();

        quotes = data;

        showQuote();

        setInterval(showQuote,5000);

    }catch(error){

        document.getElementById("quote").innerHTML =
        "Không tải được dữ liệu danh ngôn";

    }

}

//==============================
// HIỂN THỊ
//==============================

function showQuote(){

    if(quotes.length === 0) return;

    const quote = document.getElementById("quote");
    const author = document.getElementById("author");

    quote.style.opacity = 0;

    setTimeout(()=>{

        quote.innerHTML = quotes[index].text;
        author.innerHTML = "— " + quotes[index].author;

        quote.style.opacity = 1;

        index++;

        if(index >= quotes.length){
            index = 0;
        }

    },300);
}
loadQuotes();
</script>
</body>
</html>
