<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:transparent;
}

.quote-box{
    width:100%;
    max-width:700px;
    margin:auto;
    padding:20px;
    border-radius:16px;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    box-sizing:border-box;
    box-shadow:0 5px 15px rgba(0,0,0,0.25);
    text-align:center;
}

.quote-icon{
    font-size:40px;
    opacity:0.4;
}

.quote-text{
    font-size:22px;
    line-height:1.6;
    margin:15px 0;
    min-height:80px;
    transition:0.4s;
}

.quote-author{
    font-size:15px;
    opacity:0.8;
}

@media(max-width:768px){
    .quote-text{
        font-size:18px;
    }
}
</style>
</head>

<body>

<div class="quote-box">
    <div class="quote-icon">❝</div>
    <div class="quote-text" id="quote"></div>
    <div class="quote-author" id="author"></div>
</div>

<script>
const quotes = [
{
text:"Có công mài sắt, có ngày nên kim.",
author:"Tục ngữ Việt Nam"
},
{
text:"Học ăn, học nói, học gói, học mở.",
author:"Tục ngữ Việt Nam"
},
{
text:"Thất bại là mẹ thành công.",
author:"Danh ngôn"
},
{
text:"Tri thức là sức mạnh.",
author:"Francis Bacon"
},
{
text:"Không gì là không thể với người luôn cố gắng.",
author:"Alexander Đại đế"
},
{
text:"Đi một ngày đàng, học một sàng khôn.",
author:"Tục ngữ Việt Nam"
}
];

let index = 0;

function showQuote(){
    document.getElementById("quote").innerHTML = quotes[index].text;
    document.getElementById("author").innerHTML = "— " + quotes[index].author;

    index++;
    if(index >= quotes.length){
        index = 0;
    }
}

showQuote();

setInterval(showQuote, 5000);
</script>

</body>
</html>
